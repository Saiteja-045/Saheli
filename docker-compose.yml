version: '3.9'
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://mongo:27017/saheli
      - CORS_ORIGINS=http://localhost:8080
    depends_on:
      - mongo
    ports:
      - "3001:3001"

  app:
    build:
      context: ./app
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo_data:
